services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-brainlink}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  python-api:
    build:
      context: ./backEnd
      dockerfile: Dockerfile.python
    environment:
      PORT: 8082
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      FAISS_DIR: /data/faiss_index
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      HUGGINGFACEHUB_API_TOKEN: ${HUGGINGFACEHUB_API_TOKEN:-}
    volumes:
      - faiss_data:/data
    ports:
      - "8082:8082"

  api:
    build:
      context: ./backEnd
      dockerfile: Dockerfile.node
    depends_on:
      - mongo
      - python-api
    environment:
      NODE_ENV: production
      PORT: 8081
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/brainlink}
      PYTHON_BASE_URL: http://python-api:8082
    ports:
      - "8081:8081"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mongo_data:
  faiss_data:
